    <!-- Redirect old /my-portfolio/ URLs to /anshuman-singh/ -->
    <script>
      if (window.location.pathname.indexOf('/my-portfolio') === 0) {
        window.location.replace(
          window.location.pathname.replace('/my-portfolio', '/anshuman-singh') +
          window.location.search + window.location.hash
        );
      }
    </script>
    <!-- SPA redirect handler: restores the path encoded by 404.html -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
